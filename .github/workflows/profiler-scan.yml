# =============================================================================
#  Scheduled CAST Profiler scan
# =============================================================================
#  For every project in the matrix below, in its OWN parallel job:
#    1. clone the repo (shallow)
#    2. run the CAST Profiler CLI docker image on it
#    3. find the generated <app>.json (D3 evaluation + telemetry result)
#    4. derive the dominant language from the result's `composition`, capture the
#       profiler result URL from the CLI output, and upload <app>.json + a small
#       meta.json as one artifact
#
#  Then a single publish-page job builds a GitHub Pages dashboard (run history,
#  per-repo profiler URL / logs / JSON download) and pushes it to gh-pages.
#
#  Runs at 9 PM IST (= 15:30 UTC) every day, and can be started manually.
#
#  ---------------------------------------------------------------------------
#  TO ADD / REMOVE A PROJECT: edit the matrix `include:` list below.
#    - url : the repo's public clone URL
#    - name: the app name passed to the profiler's --name flag (also the folder
#            the profiler creates in its output, and the artifact name)
#
#  NO SECRET REQUIRED: the profiler CLI runs without an analysis key.
#
#  RETENTION_DAYS is the single source of truth for how long a result's JSON is
#  kept: it sets both the Actions artifact retention AND how long the dashboard
#  keeps the JSON downloadable before pruning it. Bump it in one place.
# =============================================================================

name: Scheduled Profiler scan

on:
  schedule:
    - cron: '30 14 * * *'    # 15:30 UTC == 21:00 (9 PM) IST, every day
  workflow_dispatch: {}     # allow manual runs from the Actions tab

permissions:
  contents: read

concurrency:
  group: profiler-scan
  cancel-in-progress: false

env:
  RETENTION_DAYS: '1'        # JSON retention: artifact + dashboard download window
  LOG_RETENTION_DAYS: '90'   # GitHub's Actions log retention (for the dashboard's log links)
  MAX_RUNS: '0'              # hard cap on runs kept in the dropdown (0 = keep all; metadata is tiny)

jobs:
  scan:
    name: scan ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false          # one project failing must NOT cancel the others
      # max-parallel: 5         # uncomment to cap how many scans run at once
      matrix:
        include:
          # ===== EDIT THIS LIST (url = public clone URL, name = --name app) ====
          - name: intellij-community
            url: https://github.com/jetbrains/intellij-community
          - name: apache-netbeans
            url: https://github.com/apache/netbeans.git
          - name: keycloak
            url: https://github.com/keycloak/keycloak
          - name: jetbrains-android
            url: https://github.com/JetBrains/android
          - name: dotnet-roslyn
            url: https://github.com/dotnet/roslyn
          - name: elasticsearch
            url: https://github.com/elastic/elasticsearch
          - name: apache-camel
            url: https://github.com/apache/camel
          - name: dotnet-runtime
            url: https://github.com/dotnet/runtime
          - name: apache-beam
            url: https://github.com/apache/beam
          - name: apache-hadoop
            url: https://github.com/apache/hadoop
          - name: mono
            url: https://github.com/mono/mono
          # ====================================================================

    steps:
      - name: Checkout this repo (meta helper script)
        uses: actions/checkout@v4

      - name: Clone ${{ matrix.name }}
        env:
          REPO_URL: ${{ matrix.url }}
        run: |
          git clone --depth 1 "$REPO_URL" source

      - name: Run CAST Profiler CLI
        env:
          APP: ${{ matrix.name }}
        run: |
          mkdir -p results
          # The profiler runs as user 'profiler' (uid 10001) in the container and
          # must be able to write into the mounted output folder.
          chmod 777 results
          # Mirrors the local command, plus a mount for the results folder:
          #   docker run --rm --pull always \
          #     -v <src>:/source \
          #     -v <out>:/home/profiler/.local/share/CAST/CAST-Profiler \
          #     castimaging/profiler-cli:latest --name <app> /source -ci
          # Tee the CLI output so we can extract the result URL it prints at the end.
          docker run --rm --pull always \
            -v "${PWD}/source:/source" \
            -v "${PWD}/results:/home/profiler/.local/share/CAST/CAST-Profiler" \
            castimaging/profiler-cli:latest \
            --name "$APP" /source -ci 2>&1 | tee "$RUNNER_TEMP/profiler.log"

      - name: Assemble result + meta
        env:
          APP: ${{ matrix.name }}
          REPO_URL: ${{ matrix.url }}
        run: |
          # The container wrote as a different user; take ownership so we can read it.
          sudo chown -R "$(id -u):$(id -g)" results || true
          # Layout: results/<app>/<app>.json
          json="$(find "results/$APP" -type f -name '*.json' ! -name '*.json.zs' \
                    -printf '%T@ %p\n' 2>/dev/null | sort -nr | head -n1 | cut -d' ' -f2-)"
          if [ -z "$json" ]; then
            echo "::error::No .json found under results/$APP — did the profiler succeed?"
            echo "results tree:"; find results -maxdepth 4 2>/dev/null | sed 's/^/  /' || true
            exit 1
          fi
          echo "Found: $json ($(du -h "$json" | cut -f1))"

          # Profiler result URL printed by the CLI.
          url="$(grep -oE 'https://profiler\.castsoftware\.io/v2/results\?at=[0-9a-fA-F-]+' \
                   "$RUNNER_TEMP/profiler.log" | tail -n1)"
          echo "Result URL: ${url:-<none>}"

          # owner/repo from the clone URL.
          repo="$(echo "$REPO_URL" | sed -E 's#^https?://github.com/##; s#\.git$##; s#/+$##')"

          # Stage the artifact: the raw JSON + a small meta.json for the dashboard.
          # meta.json's dominant language is the top programming language by lines
          # of code, read from the result's `composition`.
          out="$RUNNER_TEMP/out"
          mkdir -p "$out"
          cp "$json" "$out/$APP.json"
          python3 page/result_meta.py "$out/meta.json" "$APP" "$repo" "$url" "$json"
          cat "$out/meta.json"; echo

      - name: Upload result (${{ matrix.name }})
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}            # one artifact per app: <app>.json + meta.json
          path: ${{ runner.temp }}/out
          overwrite: true
          retention-days: ${{ env.RETENTION_DAYS }}
          if-no-files-found: error

  # ===========================================================================
  #  Build the GitHub Pages dashboard from every scan's result and push it to
  #  the gh-pages branch (which also persists the run history across runs).
  #  Runs after all scans finish, even if some failed.
  # ===========================================================================
  publish-page:
    name: Publish dashboard
    needs: scan
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write           # push the built site to gh-pages
      actions: read             # read this run's jobs (log links + scan times)
    steps:
      - name: Checkout repo (page template + build script)
        uses: actions/checkout@v4

      - name: Checkout gh-pages (existing history)
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: site

      - name: Download all result artifacts
        uses: actions/download-artifact@v6
        with:
          path: incoming

      - name: Fetch this run's jobs (log links + times)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100" \
            > "$RUNNER_TEMP/jobs.json"

      - name: Build the dashboard
        env:
          SITE: site
          INCOMING: incoming
          JOBS_JSON: ${{ runner.temp }}/jobs.json
          TEMPLATE: page/index.html
          REPO: ${{ github.repository }}
          RUN_NUMBER: ${{ github.run_number }}
          RUN_ID: ${{ github.run_id }}
          RUN_STATUS: ${{ needs.scan.result }}
          RETENTION_DAYS: ${{ env.RETENTION_DAYS }}
          LOG_RETENTION_DAYS: ${{ env.LOG_RETENTION_DAYS }}
          MAX_RUNS: ${{ env.MAX_RUNS }}
        run: python3 page/build_site.py

      - name: Publish to gh-pages (squashed, single commit)
        run: |
          cd site
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Publish the whole built tree as ONE fresh commit and force-push it.
          # This discards gh-pages git history every run, so the repo never
          # accumulates the large result blobs that pruning removes from the tree.
          # Run history is preserved in the FILES (runs/*.json), not in commits.
          git checkout --orphan publish
          git add -A
          git commit -q -m "Publish profiler dashboard for run #${{ github.run_number }}"
          git push -f origin publish:gh-pages
