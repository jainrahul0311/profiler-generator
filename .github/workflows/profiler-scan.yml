# =============================================================================
#  Scheduled CAST Profiler scan
# =============================================================================
#  For every project in the matrix below, in its OWN parallel job:
#    1. clone the repo (shallow)
#    2. run the CAST Profiler CLI docker image on it
#    3. find the generated <app>.json (D3 evaluation + telemetry result)
#    4. upload it as a build artifact named after the app
#
#  Runs at 9 PM IST (= 15:30 UTC) every day, and can be started manually.
#
#  ---------------------------------------------------------------------------
#  TO ADD / REMOVE A PROJECT: edit the matrix `include:` list below.
#    - url : the repo's public clone URL
#    - name: the app name passed to the profiler's --name flag (also the folder
#            the profiler creates in its output, and the artifact name)
#
#  NO SECRET REQUIRED: the profiler CLI runs without an analysis key.
#  ---------------------------------------------------------------------------
#
#  Mirrors the local command:
#    docker run --rm --pull always \
#      -v <src>:/source \
#      castimaging/profiler-cli:latest --name <app> /source -ci
#
#  The CLI writes its results, inside the container, to:
#    /home/profiler/.local/share/CAST/CAST-Profiler/<app>/
#        <app>.json                  <- D3 evaluation + telemetry (the artifact)
#        <app>.json.zs               <- compressed profiler report
#        <app>-insight-report.html   <- HTML insight report
#  We mount a host folder onto that path so we can collect <app>.json.
# =============================================================================

name: Scheduled Profiler scan

on:
  schedule:
    - cron: '30 14 * * *'    # 15:30 UTC == 21:00 (9 PM) IST, every day
  workflow_dispatch: {}     # allow manual runs from the Actions tab

permissions:
  contents: read

concurrency:
  group: profiler-scan
  cancel-in-progress: false

jobs:
  scan:
    name: scan ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false          # one project failing must NOT cancel the others
      # max-parallel: 5         # uncomment to cap how many scans run at once
      matrix:
        include:
          # ===== EDIT THIS LIST (url = public clone URL, name = --name app) ====
          - name: intellij-community
            url: https://github.com/jetbrains/intellij-community
          - name: apache-netbeans
            url: https://github.com/apache/netbeans.git
          - name: keycloak
            url: https://github.com/keycloak/keycloak
          - name: jetbrains-android
            url: https://github.com/JetBrains/android
          - name: dotnet-roslyn
            url: https://github.com/dotnet/roslyn
          - name: elasticsearch
            url: https://github.com/elastic/elasticsearch
          - name: apache-camel
            url: https://github.com/apache/camel
          - name: dotnet-runtime
            url: https://github.com/dotnet/runtime
          - name: apache-beam
            url: https://github.com/apache/beam
          - name: apache-hadoop
            url: https://github.com/apache/hadoop
          - name: mono
            url: https://github.com/mono/mono
          # ====================================================================

    steps:
      - name: Clone ${{ matrix.name }}
        env:
          REPO_URL: ${{ matrix.url }}
        run: |
          git clone --depth 1 "$REPO_URL" source

      - name: Run CAST Profiler CLI
        env:
          APP: ${{ matrix.name }}
        run: |
          mkdir -p results
          # The profiler runs as user 'profiler' (uid 10001) in the container and
          # must be able to write into the mounted output folder.
          chmod 777 results
          # Mirrors the local command, plus a mount for the results folder:
          #   docker run --rm --pull always \
          #     -v <src>:/source \
          #     -v <out>:/home/profiler/.local/share/CAST/CAST-Profiler \
          #     castimaging/profiler-cli:latest --name <app> /source -ci
          # Tee the CLI output so we can extract the result URL it prints at the end.
          docker run --rm --pull always \
            -v "${PWD}/source:/source" \
            -v "${PWD}/results:/home/profiler/.local/share/CAST/CAST-Profiler" \
            castimaging/profiler-cli:latest \
            --name "$APP" /source -ci 2>&1 | tee "$RUNNER_TEMP/profiler.log"

      - name: Capture profiler result URL
        env:
          APP: ${{ matrix.name }}
        run: |
          # The CLI prints e.g.:
          #   The CAST Profiler report can be obtained at: https://profiler.castsoftware.io/v2/results?at=<uuid>
          url="$(grep -oE 'https://profiler\.castsoftware\.io/v2/results\?at=[0-9a-fA-F-]+' \
                   "$RUNNER_TEMP/profiler.log" | tail -n1)"
          if [ -z "$url" ]; then
            echo "::warning::No profiler result URL found in the CLI output for $APP"
            url="(no URL produced)"
          fi
          echo "$APP result URL: $url"
          # Write a single "<app>\t<url>" line to a file that the collect job gathers.
          mkdir -p "$RUNNER_TEMP/url"
          printf '%s\t%s\n' "$APP" "$url" > "$RUNNER_TEMP/url/$APP.txt"

      - name: Upload result URL
        uses: actions/upload-artifact@v7
        with:
          name: profiler-url-${{ matrix.name }}
          path: ${{ runner.temp }}/url/${{ matrix.name }}.txt
          overwrite: true
          retention-days: 1
          if-no-files-found: warn

      - name: Locate the .json result
        env:
          APP: ${{ matrix.name }}
        run: |
          # The container wrote as a different user; take ownership so we can read it.
          sudo chown -R "$(id -u):$(id -g)" results || true
          # Layout: results/<app>/<app>.json
          json="$(find "results/$APP" -type f -name '*.json' ! -name '*.json.zs' \
                    -printf '%T@ %p\n' 2>/dev/null | sort -nr | head -n1 | cut -d' ' -f2-)"
          if [ -z "$json" ]; then
            echo "::error::No .json found under results/$APP — did the profiler succeed?"
            echo "results tree:"; find results -maxdepth 4 2>/dev/null | sed 's/^/  /' || true
            exit 1
          fi
          echo "Found: $json ($(du -h "$json" | cut -f1))"
          echo "JSON_PATH=$json" >> "$GITHUB_ENV"
          # Zip just that one file (-j = store only the filename, drop its folder path)
          zip -j -0 "$RUNNER_TEMP/$APP.json.zip" "$json"
          echo "JSON_ZIP=$RUNNER_TEMP/$APP.json.zip" >> "$GITHUB_ENV"

      - name: Upload ${{ matrix.name }}.json
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}.json      # stable name -> same artifact name every day
          path: ${{ env.JSON_ZIP }}          # upload the zip of the single .json
          overwrite: true
          retention-days: 1
          if-no-files-found: error
          compression-level: 0               # payload is already a .zip

  # ===========================================================================
  #  Collect every scan's profiler result URL and print them all in one place.
  #  Runs after all scan jobs finish (even if some failed) and gathers the
  #  per-app "profiler-url-*" artifacts each scan job uploaded.
  #
  #  The "profiler-url-*" artifacts are only transient scratch used to pass each
  #  URL to this job — the final step DELETES them so the finished run keeps only
  #  the <app>.json artifacts. Cleanup runs on success / failure / warn alike.
  # ===========================================================================
  collect-urls:
    name: Collect profiler result URLs
    needs: scan
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write            # needed to delete the transient URL artifacts
    steps:
      - name: Download all URL artifacts
        uses: actions/download-artifact@v6
        with:
          pattern: profiler-url-*
          path: urls
          merge-multiple: true

      - name: Print all profiler result URLs
        run: |
          echo "## CAST Profiler result URLs" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| App | Result URL |" >> "$GITHUB_STEP_SUMMARY"
          echo "| --- | ---------- |" >> "$GITHUB_STEP_SUMMARY"
          echo ""
          echo "==================== CAST Profiler result URLs ===================="
          if [ -d urls ] && ls urls/*.txt >/dev/null 2>&1; then
            # Each file holds one "<app>\t<url>" line; sort by app name.
            sort urls/*.txt | while IFS=$'\t' read -r app url; do
              printf '%-40s %s\n' "$app" "$url"
              echo "| \`$app\` | $url |" >> "$GITHUB_STEP_SUMMARY"
            done
          else
            echo "No URL artifacts were found."
            echo "_No URL artifacts were found._" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "=================================================================="

      # If ANY scan job failed, this job still runs (if: always) but must NOT be a
      # clean success — surface a warning annotation so the run is flagged instead.
      # needs.scan.result is the aggregate of all matrix jobs: 'success' only when
      # every scan succeeded, otherwise 'failure'.
      - name: Warn if any scan failed
        if: ${{ needs.scan.result != 'success' }}
        run: |
          echo "::warning title=Some scans failed::One or more scan jobs did not succeed (needs.scan.result='${{ needs.scan.result }}'). Result URLs above cover only the scans that completed."
          echo "> ⚠️ One or more scan jobs did not succeed — result URLs above cover only the scans that completed." >> "$GITHUB_STEP_SUMMARY"

      # Delete the transient "profiler-url-*" artifacts now that their URLs have
      # been printed, so the finished run keeps only the <app>.json artifacts.
      # Runs regardless of outcome (success / failure / warn).
      - name: Clean up URL artifacts
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ids="$(gh api --paginate \
                   "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts" \
                   -q '.artifacts[] | select(.name | startswith("profiler-url-")) | .id')"
          if [ -z "$ids" ]; then
            echo "No profiler-url-* artifacts to delete."
            exit 0
          fi
          for id in $ids; do
            if gh api -X DELETE "repos/${{ github.repository }}/actions/artifacts/$id"; then
              echo "Deleted URL artifact $id"
            else
              echo "::warning::Failed to delete URL artifact $id"
            fi
          done
